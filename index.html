<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>سبوت لايت لحجز الزواجات</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f7f8;
      margin: 0;
      color: #222;
    }

    .container {
      max-width: 600px;
      margin: auto;
      padding: 15px;
    }

    .card {
      background: #fff;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.06);
    }

    h2 {
      margin-top: 0;
    }

    p {
      line-height: 1.7;
      color: #555;
    }

    label {
      display: block;
      margin-top: 10px;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input,
    textarea,
    button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 16px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    button {
      background: #111;
      color: #fff;
      font-weight: bold;
      margin-top: 14px;
      cursor: pointer;
      border: none;
    }

    button:hover {
      opacity: 0.95;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="card">
      <h2>سبوت لايت لحجز الزواجات</h2>
      <p>اختر التاريخ المناسب. الحجز يكون على أساس يوم كامل فقط، والحد الأقصى حجزين في اليوم.</p>
    </div>

    <form class="card" onsubmit="handleBooking(event)">
      <label for="name">اسم العميل</label>
      <input id="name" type="text" required />

      <label for="phone">رقم الجوال</label>
      <input id="phone" type="text" required />

      <label for="date">تاريخ الزفاف</label>
      <input id="date" type="date" required />

      <label for="notes">ملاحظات</label>
      <textarea id="notes"></textarea>

      <button type="submit">تأكيد الحجز</button>
    </form>

  </div>

  <script>
    let bookings = JSON.parse(localStorage.getItem("bookings") || "{}");

    function handleBooking(e) {
      e.preventDefault();

      const date = document.getElementById("date").value;

      if (!bookings[date]) {
        bookings[date] = 0;
      }

      if (bookings[date] >= 2) {
        alert("هذا اليوم محجوز بالكامل ❌ اختر تاريخ آخر");
        return;
      }

      bookings[date] += 1;
      localStorage.setItem("bookings", JSON.stringify(bookings));

      alert("تم الحجز بنجاح ✅");
    }
  </script>
</body>
</html>
